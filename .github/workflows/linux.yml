name: Linux CLI

on:
  push:
    paths:
      - "linux/**"
      - ".github/workflows/linux.yml"
  pull_request:
    paths:
      - "linux/**"
      - ".github/workflows/linux.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: linux/go.mod
          cache-dependency-path: linux/go.sum
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /tmp/sms-amd64 .
      - name: Build arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o /tmp/sms-arm64 .
